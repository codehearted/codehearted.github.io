<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Three.js Interactive Scene</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Main Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 50%; /* Shift canvas to the left half */
            width: 50vw;
            height: 100vh;
            z-index: 1;
        }

        /* Debug Log Panel */
        #debug-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 50vw; /* Right half */
            height: 100vh;
            background-color: #2d2d2d; /* Dark grey */
            color: #0f0; /* Matrix green text */
            font-family: monospace;
            padding: 20px;
            box-sizing: border-box;
            z-index: 2;
            overflow-y: auto; /* Scroll if logs get long */
            border-left: 2px solid #0f0; /* Green divider line */
        }

        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #444; }
        .timestamp { color: #fff; opacity: 0.7; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="debug-panel">
    <h3>System Debug Log</h3>
    <div id="log-content"></div>
</div>

<!-- Import Three.js as a module -->
<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    // --- 1. Setup Scene, Camera, Renderer ---
    const scene = new THREE.Scene();
    
    // Perspective Camera: FOV 75, Aspect Ratio (Width/Height), Near Clip 0.1, Far Clip 100
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth * 0.5, window.innerHeight); // Left half of screen
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // --- 2. Interactive Object (Cube) ---
    const geometry = new THREE.BoxGeometry(); // Default size is 1x1x1
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); // Green
    const cube = new THREE.Mesh(geometry, material);
    
    scene.add(cube);

    // --- 3. Debug Logging Function ---
    function logToPanel(message) {
        const now = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        // We use a small font size because the log panel is already text-heavy
        const preText = document.createTextNode(`[${now}] `);
        entry.appendChild(preText);
        
        // Create a span for the message content (allows styling later if needed)
        const msgText = document.createTextNode(message);
        entry.appendChild(msgText);

        // Insert at the top of logs, or append to bottom? Let's prepend for newest first.
        const logContent = document.getElementById('log-content');
        // Insert after the H3 title but before other logs
        if (logContent.children.length > 1) { // If there are logs, insert before the first one
             logContent.insertBefore(entry, logContent.children[1]);
        } else { // Otherwise just append after H3 (which is children[0])
             logContent.appendChild(entry);
        }
    }

    // --- 4. Interaction Handling (Mouse Movement) ---
    window.addEventListener('mousemove', (event) => {
        // Calculate mouse position relative to the canvas container
        const x = event.clientX;
        const y = event.clientY;

        // Update the cube's rotation based on mouse position (Interactive!)
        const targetRotationY = x / window.innerWidth - 0.5;
        const targetRotationX = y / window.innerHeight - 0.5;

        // Smoothly interpolate rotation (simple lerp)
        cube.rotation.y += targetRotationY * 0.1;
        cube.rotation.x += -targetRotationX * 0.1;

        // Log the interaction
        logToPanel(`Mouse Interaction: X=${x}, Y=${y} -> Cube Rotated to [${cube.rotation.y.toFixed(2)}, ${cube.rotation.x.toFixed(2)}]`);
    });

    // --- 5. Animation Loop (Rendering) ---
    function animate() {
        requestAnimationFrame(animate);

        // Add a periodic "System Status" log to show the loop is running
        const time = new Date().toLocaleTimeString();
        if (Math.random() > 0.98) { // Only log occasionally to avoid spamming
            logToPanel(`Render Loop Active: Frame Rate Normal. Cube Position: ${cube.position}`);
        }

        renderer.render(scene, camera);
    }

    // Log initial setup
    logToPanel("Three.js Scene Initialized. Renderer attached to DOM.");
    logToPanel("Cube created: Green Box Geometry 1x1x1");

    animate();
</script>

</body>
</html>
