<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyberpunk City Scene</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=400;700&display=swap');
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        
        /* Cyberpunk UI */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            background: rgba(16, 16, 16, 0.9);
            border: 1px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            padding: 20px;
            border-radius: 4px;
            z-index: 10;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
        }

        .label { font-size: 12px; margin-bottom: 10px; letter-spacing: 2px; }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #333; height: 6px; border-radius: 3px; border: 1px solid #00f0ff;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px; background: #ff0055;
            border: 2px solid #00f0ff; border-radius: 0px; cursor: pointer;
            box-shadow: 0 0 10px #ff0055;
        }
        
        #controls-hint {
            position: absolute; top: 20px; right: 20px; color: rgba(255,255,255,0.7);
            font-family: 'Orbitron', sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="controls-hint">
        [ MOUSE ] to Look<br>
        [ WASD ] to Move
    </div>

    <div id="ui-container">
        <div class="label">System Brightness</div>
        <input type="range" min="0" max="1" step="0.01" value="0.5" id="brightnessSlider">
        <div class="label">Light Intensity: <span id="val">50%</span></div>
    </div>

    <!-- Import Three.js Modules -->
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.16.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.16.0/examples/jsm/controls/OrbitControls.js';
        import { EffectComposer } from 'https://unpkg.com/three@0.16.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://unpkg.com/three@0.16.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://unpkg.com/three@0.16.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // --- Config ---
        const sceneConfig = {
            fog: 0x050505,
            neonPink: 0xff0055,
            neonCyan: 0x00f0ff,
            neonYellow: 0xffd000,
            asphaltGray: 0x111111
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(sceneConfig.fog, 10, 150);
        scene.background = new THREE.Color(sceneConfig.fog);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 0.5;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing (Bloom) ---
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight), 
            1.0, // Strength
            0.4, // Radius
            0.85 // Threshold
        );
        composer.addPass(bloomPass);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2; // Prevent looking underground

        // --- Geometry & Lighting ---
        scene.add(new THREE.AmbientLight(0x111111, 1)); // Dark ambient

        // The Main Source (Sun/Light)
        const mainLight = new THREE.PointLight(sceneConfig.neonCyan, 2, 50);
        mainLight.position.set(0, 10, 0);
        scene.add(mainLight);

        // 1. The Street (Ground)
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.4, metalness: 0.6 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 2. Buildings (Procedural)
        const buildings = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        
        function createBuilding(x, z, w, d, h) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x222222, roughness: 0.9, metalness: 0.3
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, h/2, z);
            scene.add(mesh);
            buildings.push(mesh);
        }

        // Generate Grid
        for(let i = -10; i < 10; i++) {
            // Left Side
            if(Math.random() > 0.5) createBuilding(-5 - (Math.random()*10), (i*20) + 5, 10, 10, 10 + Math.random()*30);
            // Right Side
            if(Math.random() > 0.5) createBuilding(5 + (Math.random()*10), (i*20) + 5, 10, 10, 10 + Math.random()*30);
        }

        // 3. Neon Elements
        const neonGroup = new THREE.Group();
        scene.add(neonGroup);

        function addNeonLight(w, color, pos) {
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, 0.5), mat);
            mesh.position.set(pos.x, pos.y, pos.z);
            neonGroup.add(mesh);
        }

        // Left Building Neon
        addNeonLight(4, sceneConfig.neonPink, { x: -4, y: 5, z: 10 });
        addNeonLight(2, sceneConfig.neonCyan, { x: -4, y: 2, z: 10 });
        
        // Right Building Neon
        addNeonLight(4, sceneConfig.neonCyan, { x: 4, y: 6, z: -10 });
        addNeonLight(2, sceneConfig.neonYellow, { x: 4, y: 3, z: -10 });

        // Street Lights (Cylinders)
        const lightGeo = new THREE.CylinderGeometry(0.1, 0.1, 3, 16);
        const lightMat = new THREE.MeshBasicMaterial({ color: sceneConfig.neonCyan });
        for(let z = -50; z < 50; z+= 10) {
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4), new THREE.MeshStandardMaterial({color:0x333}));
            pole.position.set(-3, 2, z);
            scene.add(pole);
            const light = new THREE.Mesh(lightGeo, lightMat);
            light.position.set(-3, 4.5, z);
            scene.add(light);
        }

        // 4. Rain Particles
        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 2000;
        const rainPositions = new Float32Array(rainCount * 3);
        const rainVelocities = new Float32Array(rainCount);

        for(let i=0; i<rainCount; i++) {
            rainPositions[i*3] = (Math.random() - 0.5) * 60;
            rainPositions[i*3+1] = Math.random() * 50;
            rainPositions[i*3+2] = (Math.random() - 0.5) * 100;
            rainVelocities[i] = -0.5 - Math.random();
        }

        rainGeo.setAttribute('position', rainPositions);
        const rainMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const rain = new THREE.LineSegments(rainGeo, rainMat);
        scene.add(rain);

        // --- Interaction Logic ---
        
        // UI Slider Logic
        const slider = document.getElementById('brightnessSlider');
        const valDisplay = document.getElementById('val');
        
        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            valDisplay.innerText = Math.round(val * 100) + "%";
            
            // Adjust Bloom (The Glow)
            bloomPass.strength = val * 2; // 0 = No Glow, 1 = Normal Glow
            
            // Adjust Light Intensity
            mainLight.intensity = val * 4;
        });

        // WASD Movement Logic
        const keys = { w: false, a: false, s: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // Animation Loop
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const speed = 10 * delta;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            
            if (keys.w) camera.position.add(forward.multiplyScalar(speed));
            if (keys.s) camera.position.add(forward.multiplyScalar(-speed));
            if (keys.a) camera.position.add(right.multiplyScalar(-speed));
            if (keys.d) camera.position.add(right.multiplyScalar(speed));

            // Rain Animation
            const positions = rain.geometry.attributes.position;
            for(let i=0; i<rainCount; i++) {
                rainPositions[i*3+1] -= 0.5;
                if(rainPositions[i*3+1] < -5) rainPositions[i*3+1] = 50;
            }
            positions.needsUpdate = true;

            controls.update();
            composer.render();
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
