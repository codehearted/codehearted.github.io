<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かな — Kana Voice Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=DM+Mono:wght@400;500&family=Noto+Serif+JP:wght@400&family=Noto+Sans+JP:wght@400&family=M+PLUS+1p:wght@400&family=Kaisei+Decol:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: rgba(255,255,255,0.08);
    --border-med: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text-muted: rgba(240,237,232,0.45);
    --text-dim: rgba(240,237,232,0.2);
    --accent: #c8a97e;
    --accent-dim: rgba(200,169,126,0.15);
    --green: #6fcf8e;
    --green-dim: rgba(111,207,142,0.12);
    --red: #e06c6c;
    --red-dim: rgba(224,108,108,0.12);
    --radius: 12px;
    --font-jp: 'Shippori Mincho', serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); -webkit-font-smoothing: antialiased; }

  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  #app { position: relative; z-index: 1; width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; }

  header { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }

  .title { font-family: var(--font-jp); font-size: 20px; color: var(--accent); letter-spacing: 0.1em; }

  .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .tab { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 5px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
  .tab.active { background: var(--accent-dim); color: var(--accent); }

  .card {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2rem 2rem 1.75rem; display: flex;
    flex-direction: column; align-items: center; position: relative; overflow: hidden;
  }
  .card::before, .card::after { content: ''; position: absolute; width: 24px; height: 24px; border-color: var(--accent); border-style: solid; opacity: 0.35; }
  .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  #kana-display {
    font-size: 130px; line-height: 1; color: var(--text);
    margin: 0 0 0; transition: opacity 0.18s, transform 0.18s;
    text-shadow: 0 0 60px rgba(200,169,126,0.12);
    cursor: pointer; user-select: none;
  }
  #kana-display:hover { opacity: 0.8; }
  #kana-display.flash-correct { color: var(--green); text-shadow: 0 0 40px rgba(111,207,142,0.3); }
  #kana-display.flash-wrong { color: var(--red); }

  #alt-fonts {
    display: flex; gap: 20px; justify-content: center; align-items: center;
    min-height: 52px; margin: 4px 0 0;
  }
  .alt-char {
    font-size: 42px; line-height: 1; color: var(--text-muted);
    opacity: 0; transform: scale(0.85);
    transition: opacity 0.35s, transform 0.35s;
    cursor: pointer; user-select: none;
  }
  .alt-char.visible { opacity: 1; transform: scale(1); }

  #romaji-hint {
    font-size: 14px; color: var(--text-muted); height: 22px;
    letter-spacing: 0.1em; margin-bottom: 1.5rem;
    transition: color 0.2s; cursor: pointer; user-select: none;
  }
  #romaji-hint:not(:empty):hover { color: var(--text); }

  #mic-btn {
    width: 72px; height: 72px; border-radius: 50%;
    border: 1px solid var(--border-med); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-bottom: 1.25rem;
  }
  #mic-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
  #mic-btn.listening { border-color: var(--green); background: var(--green-dim); animation: mic-pulse 1.6s ease-in-out infinite; }
  #mic-btn.correct { border-color: var(--green); background: var(--green-dim); }
  #mic-btn.wrong { border-color: var(--red); background: var(--red-dim); }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(111,207,142,0.25); }
    50%       { box-shadow: 0 0 0 12px rgba(111,207,142,0); }
  }
  #mic-btn svg { width: 26px; height: 26px; transition: color 0.2s; }
  #mic-btn.listening svg { color: var(--green); }
  #mic-btn.correct svg  { color: var(--green); }
  #mic-btn.wrong svg    { color: var(--red); }

  #transcript { font-size: 20px; min-height: 30px; color: var(--text-muted); letter-spacing: 0.06em; margin-bottom: 0.3rem; text-align: center; }

  #feedback { font-size: 12px; height: 18px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 1.5rem; }
  #feedback.ok  { color: var(--green); }
  #feedback.err { color: var(--red); }

  .actions { display: flex; gap: 8px; }
  .action-btn { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .action-btn:hover { border-color: var(--border-med); color: var(--text); }
  .action-btn.danger:hover { border-color: var(--red); color: var(--red); }

  .scores {
    width: 100%; display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-top: 1.25rem;
  }
  .score-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.5rem; text-align: center; }
  .score-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .score-num { font-size: 20px; font-weight: 500; color: var(--text); }
  #score-streak .score-num { color: var(--accent); }
  #score-pct .score-num { color: var(--text-muted); font-size: 16px; }

  .score-actions { width: 100%; display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .score-actions .action-btn { font-size: 10px; padding: 4px 10px; }

  #error { margin-top: 0.75rem; font-size: 12px; color: var(--red); text-align: center; letter-spacing: 0.04em; min-height: 18px; }
  #instruction { margin-top: 1.5rem; font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; text-align: center; line-height: 1.8; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">かな練習</span>
    <div class="tabs">
      <button class="tab active" data-mode="hiragana">hiragana</button>
      <button class="tab" data-mode="katakana">katakana</button>
      <button class="tab" data-mode="both">both</button>
    </div>
  </header>

  <div class="card">
    <div id="kana-display" title="click to hear">あ</div>
    <div id="alt-fonts"></div>
    <div id="romaji-hint" title="click to hear"></div>

    <button id="mic-btn" title="click to speak">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" color="var(--text-muted)">
        <rect x="9.5" y="2.5" width="9" height="14" rx="4.5" fill="none"/>
        <path d="M5.5 14c0 4.694 3.806 8.5 8.5 8.5s8.5-3.806 8.5-8.5"/>
        <line x1="14" y1="22.5" x2="14" y2="26"/>
        <line x1="10" y1="26" x2="18" y2="26"/>
      </svg>
    </button>

    <div id="transcript"></div>
    <div id="feedback"></div>

    <div class="actions">
      <button class="action-btn" id="hint-btn">hint + speak</button>
      <button class="action-btn" id="skip-btn">skip →</button>
    </div>
  </div>

  <div class="scores">
    <div class="score-cell" id="score-correct">
      <div class="score-label">correct</div>
      <div class="score-num">0</div>
    </div>
    <div class="score-cell" id="score-streak">
      <div class="score-label">streak</div>
      <div class="score-num">0</div>
    </div>
    <div class="score-cell" id="score-total">
      <div class="score-label">total</div>
      <div class="score-num">0</div>
    </div>
    <div class="score-cell" id="score-pct">
      <div class="score-label">% correct</div>
      <div class="score-num">—</div>
    </div>
  </div>

  <div class="score-actions">
    <button class="action-btn danger" id="clear-stats-btn">clear stats</button>
    <button class="action-btn danger" id="reset-btn">reset scores</button>
  </div>

  <div id="error"></div>
  <div id="instruction">tap kana or romaji to hear · mic auto-starts · 1st wrong → reading · 2nd → blinks · 3rd → speaks</div>
</div>

<script>
// ─── FONTS ──────────────────────────────────────────────────────────────────
const FONTS = [
  'Shippori Mincho',
  'Noto Serif JP',
  'Noto Sans JP',
  'M PLUS 1p',
  'Kaisei Decol'
];

function pickFont(exclude = []) {
  const pool = FONTS.filter(f => !exclude.includes(f));
  return pool[Math.floor(Math.random() * pool.length)];
}

// ─── KANA DATA ───────────────────────────────────────────────────────────────
const hiragana = [
  {k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'},
  {k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'},
  {k:'さ',r:'sa'},{k:'し',r:'shi'},{k:'す',r:'su'},{k:'せ',r:'se'},{k:'そ',r:'so'},
  {k:'た',r:'ta'},{k:'ち',r:'chi'},{k:'つ',r:'tsu'},{k:'て',r:'te'},{k:'と',r:'to'},
  {k:'な',r:'na'},{k:'に',r:'ni'},{k:'ぬ',r:'nu'},{k:'ね',r:'ne'},{k:'の',r:'no'},
  {k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'},
  {k:'ま',r:'ma'},{k:'み',r:'mi'},{k:'む',r:'mu'},{k:'め',r:'me'},{k:'も',r:'mo'},
  {k:'や',r:'ya'},{k:'ゆ',r:'yu'},{k:'よ',r:'yo'},
  {k:'ら',r:'ra'},{k:'り',r:'ri'},{k:'る',r:'ru'},{k:'れ',r:'re'},{k:'ろ',r:'ro'},
  {k:'わ',r:'wa'},{k:'を',r:'wo'},{k:'ん',r:'n'}
];

const kMap = {'あ':'ア','い':'イ','う':'ウ','え':'エ','お':'オ','か':'カ','き':'キ','く':'ク','け':'ケ','こ':'コ','さ':'サ','し':'シ','す':'ス','せ':'セ','そ':'ソ','た':'タ','ち':'チ','つ':'ツ','て':'テ','と':'ト','な':'ナ','に':'ニ','ぬ':'ヌ','ね':'ネ','の':'ノ','は':'ハ','ひ':'ヒ','ふ':'フ','へ':'ヘ','ほ':'ホ','ま':'マ','み':'ミ','む':'ム','め':'メ','も':'モ','や':'ヤ','ゆ':'ユ','よ':'ヨ','ら':'ラ','り':'リ','る':'ル','れ':'レ','ろ':'ロ','わ':'ワ','を':'ヲ','ん':'ン'};
const katakana = hiragana.map(h => ({...h, k: kMap[h.k]}));

// ─── ROMANIZATION SYSTEM ────────────────────────────────────────────────────
//
// Language-configurable romanizer. toRomaji(text, lang) converts any script
// to a romaji string by processing characters left-to-right:
//   1. Two-char pair lookup (combination kana, numeric compounds)
//   2. Small-tsu doubling (っ/ッ → doubles next consonant)
//   3. Single-char lookup (hiragana, katakana, kanji, digits)
//   4. Latin passthrough (already romaji)
//   5. Everything else stripped (noise, punctuation, elongation marks)
//
// To add a new language: define a LANG_XX object with pairs, chars,
// doubleConsonant, and elongation sets, then pass it to toRomaji().
//
// Kanji note: single "representative" kanji readings are in chars (sufficient
// for STT output matching). Full kanji word support (e.g. 東京→tokyo) requires
// a dictionary layer — see FEATURES.md. That layer would pre-process text
// before handing it to toRomaji().

const LANG_JA = {
  name: 'Japanese',

  // Two-char sequences checked BEFORE single chars.
  pairs: {
    // Combination kana (hiragana)
    'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
    'しゃ':'sha','しゅ':'shu','しょ':'sho',
    'ちゃ':'cha','ちゅ':'chu','ちょ':'cho',
    'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
    'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
    'みゃ':'mya','みゅ':'myu','みょ':'myo',
    'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
    'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
    'じゃ':'ja', 'じゅ':'ju', 'じょ':'jo',
    'びゃ':'bya','びゅ':'byu','びょ':'byo',
    'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
    // Combination kana (katakana)
    'キャ':'kya','キュ':'kyu','キョ':'kyo',
    'シャ':'sha','シュ':'shu','ショ':'sho',
    'チャ':'cha','チュ':'chu','チョ':'cho',
    'ニャ':'nya','ニュ':'nyu','ニョ':'nyo',
    'ヒャ':'hya','ヒュ':'hyu','ヒョ':'hyo',
    'ミャ':'mya','ミュ':'myu','ミョ':'myo',
    'リャ':'rya','リュ':'ryu','リョ':'ryo',
    'ギャ':'gya','ギュ':'gyu','ギョ':'gyo',
    'ジャ':'ja', 'ジュ':'ju', 'ジョ':'jo',
    'ビャ':'bya','ビュ':'byu','ビョ':'byo',
    'ピャ':'pya','ピュ':'pyu','ピョ':'pyo',
    // Numeric compounds
    '10':'to','１０':'to',
  },

  // Single-char map: hiragana, katakana, common kanji, digits
  chars: {
    // Hiragana
    'あ':'a','い':'i','う':'u','え':'e','お':'o',
    'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
    'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
    'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
    'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
    'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
    'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
    'や':'ya','ゆ':'yu','よ':'yo',
    'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
    'わ':'wa','を':'wo','ん':'n',
    // Small kana standalone
    'ぁ':'a','ぃ':'i','ぅ':'u','ぇ':'e','ぉ':'o',
    'ゃ':'ya','ゅ':'yu','ょ':'yo',
    // Dakuten (voiced) — for future dakuten mode
    'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
    'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
    'だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do',
    'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
    'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
    // Katakana
    'ア':'a','イ':'i','ウ':'u','エ':'e','オ':'o',
    'カ':'ka','キ':'ki','ク':'ku','ケ':'ke','コ':'ko',
    'サ':'sa','シ':'shi','ス':'su','セ':'se','ソ':'so',
    'タ':'ta','チ':'chi','ツ':'tsu','テ':'te','ト':'to',
    'ナ':'na','ニ':'ni','ヌ':'nu','ネ':'ne','ノ':'no',
    'ハ':'ha','ヒ':'hi','フ':'fu','ヘ':'he','ホ':'ho',
    'マ':'ma','ミ':'mi','ム':'mu','メ':'me','モ':'mo',
    'ヤ':'ya','ユ':'yu','ヨ':'yo',
    'ラ':'ra','リ':'ri','ル':'ru','レ':'re','ロ':'ro',
    'ワ':'wa','ヲ':'wo','ン':'n',
    'ァ':'a','ィ':'i','ゥ':'u','ェ':'e','ォ':'o',
    'ャ':'ya','ュ':'yu','ョ':'yo',
    // Dakuten katakana
    'ガ':'ga','ギ':'gi','グ':'gu','ゲ':'ge','ゴ':'go',
    'ザ':'za','ジ':'ji','ズ':'zu','ゼ':'ze','ゾ':'zo',
    'ダ':'da','ヂ':'ji','ヅ':'zu','デ':'de','ド':'do',
    'バ':'ba','ビ':'bi','ブ':'bu','ベ':'be','ボ':'bo',
    'パ':'pa','ピ':'pi','プ':'pu','ペ':'pe','ポ':'po',
    // Common kanji STT returns for kana sounds
    '亜':'a','以':'i','位':'i','絵':'e','御':'o',
    '花':'ka','火':'ka','科':'ka','香':'ka',
    '木':'ki','気':'ki','来':'ki',
    '句':'ku','区':'ku',
    '毛':'ke','家':'ke',
    '子':'ko','個':'ko','故':'ko',
    '差':'sa','左':'sa',
    '死':'shi','四':'shi','詩':'shi',
    '素':'su','数':'su',
    '世':'se','背':'se',
    '其':'so','祖':'so',
    '田':'ta','他':'ta',
    '千':'chi','知':'chi','地':'chi',
    '都':'tsu','津':'tsu',
    '手':'te','天':'te',
    '戸':'to','十':'to',
    '名':'na','何':'na',
    '二':'ni','日':'ni','似':'ni',
    '奴':'nu',
    '根':'ne','音':'ne',
    '野':'no','乃':'no',
    '葉':'ha','歯':'ha','波':'ha',
    '比':'hi',
    '不':'fu','風':'fu',
    '辺':'he','経':'he',
    '保':'ho','本':'ho',
    '間':'ma','真':'ma','馬':'ma',
    '見':'mi','実':'mi','身':'mi',
    '無':'mu','夢':'mu',
    '目':'me','女':'me',
    '物':'mo','者':'mo',
    '屋':'ya','也':'ya',
    '由':'yu','湯':'yu',
    '余':'yo','与':'yo',
    '利':'ri','理':'ri','里':'ri',
    '留':'ru','流':'ru',
    '礼':'re','例':'re',
    '路':'ro','呂':'ro',
    '和':'wa','話':'wa',
    // Kanji numbers → primary kana reading
    '一':'i','二':'ni','三':'mi','四':'shi','五':'go',
    '六':'ro','七':'na','八':'ha','九':'ku',
    // Arabic & full-width digits → Japanese sound
    '1':'i', '2':'ni','3':'mi','4':'shi','5':'go',
    '6':'ro','7':'na','8':'ha','9':'ku', '0':'o',
    '１':'i','２':'ni','３':'mi','４':'shi','５':'go',
    '６':'ro','７':'na','８':'ha','９':'ku','０':'o',
  },

  // Characters that double the following consonant (small tsu)
  doubleConsonant: new Set(['っ','ッ']),

  // Characters that elongate the previous vowel — stripped for matching
  elongation: new Set(['ー','〜','～']),
};

/**
 * Convert text in any supported script to romaji.
 * Handles single chars, multi-syllable strings, combination kana, small tsu.
 * Pass a different lang config to support other scripts in future.
 */
function toRomaji(text, lang = LANG_JA) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    // 1. Two-char pair (combination kana, numeric compounds like "10")
    const pair = text.slice(i, i + 2);
    if (lang.pairs[pair]) {
      result += lang.pairs[pair];
      i += 2;
      continue;
    }
    const ch = text[i];

    // 2. Small tsu — doubles the first consonant of next character
    if (lang.doubleConsonant.has(ch)) {
      const nextPair = text.slice(i + 1, i + 3);
      const nextCh   = text[i + 1] || '';
      const nextR    = lang.pairs[nextPair] || lang.chars[nextCh] || '';
      if (nextR && /^[^aeiou]/.test(nextR)) result += nextR[0];
      i++;
      continue;
    }

    // 3. Elongation mark — skip
    if (lang.elongation.has(ch)) { i++; continue; }

    // 4. Single-char lookup
    const mapped = lang.chars[ch];
    if (mapped) { result += mapped; i++; continue; }

    // 5. Latin passthrough (already romaji)
    if (/[a-zA-Z]/.test(ch)) { result += ch.toLowerCase(); i++; continue; }

    // 6. Strip everything else
    i++;
  }
  return result.replace(/[・\s.,!?。、]/g, '');
}

/**
 * Returns all possible romaji readings for a text string.
 * For kana: always one result. For kanji words: multiple readings possible.
 * Stub — full kanji support requires a dictionary (kuromoji/WanaKana).
 * The array return type is intentional for future multi-reading expansion.
 */
function getPossibleReadings(text, lang = LANG_JA) {
  // TODO: for kanji words, return all candidate readings from a dictionary.
  // e.g. 日 → ['hi', 'nichi', 'bi', 'ka', 'jitsu']
  return [toRomaji(text, lang)];
}

// Accepted spelling variants (shi=si, chi=ti, etc.)
const ROMAJI_VARIANTS = {
  shi:['shi','si'], chi:['chi','ti'], tsu:['tsu','tu'],
  fu:['fu','hu'], wo:['wo','o'], n:['n','nn'],
  sha:['sha','sya'], shu:['shu','syu'], sho:['sho','syo'],
  cha:['cha','tya'], chu:['chu','tyu'], cho:['cho','tyo'],
  ja:['ja','zya','jya'], ju:['ju','zyu','jyu'], jo:['jo','zyo','jyo'],
};

// Phonetic English words STT returns when English speakers say Japanese syllables.
// Needed because latin passthrough in toRomaji() leaves these as English words.
const PHONETIC_ALTS = {
  a:['ah','uh'], i:['ee'], u:['oo'], e:['ay','eh'], o:['oh'],
  ka:['car','kah'], ki:['key','kee'], ku:['coo','koo'],
  ke:['kay','keh'], ko:['co','go'],
  sa:['sah'], shi:['she','shee'], su:['sue','soo'],
  se:['say','seh'], so:['soh'],
  ta:['tah'], chi:['chee','che'], tsu:['tsoo'],
  te:['tay','teh'], to:['toe'],
  na:['nah'], ni:['knee','nee'], nu:['noo'],
  ne:['nay','neh'], no:['know'],
  ha:['hah'], hi:['hee'], fu:['foo','who'],
  he:['hay','heh'], ho:['hoh'],
  ma:['mah'], mi:['mee'], mu:['moo'],
  me:['may','meh'], mo:['moh'],
  ya:['yah'], yu:['you','yoo'], yo:['yoh'],
  ra:['rah','la','lah'], ri:['ree','lee'],
  ru:['roo','loo'], re:['ray','lay'],
  ro:['roh','loh'], wa:['wah'], n:['en','un'],
};

function accepted(entry, allTranscripts) {
  const target = entry.r;
  const variants = ROMAJI_VARIANTS[target] || [target];
  const phonetic = PHONETIC_ALTS[target] || [];

  for (const raw of allTranscripts) {
    const converted = toRomaji(raw);

    for (const v of variants) {
      if (converted === v) return true;
      if (converted.startsWith(v)) {
        const rest = converted.slice(v.length);
        // ん special case: n + vowel = a different kana entirely, don't accept
        if (v === 'n' && /^[aeiou]/.test(rest)) continue;
        // Otherwise allow up to 2 chars of trailing STT noise
        if (rest.length <= 2) return true;
      }
    }

    // Phonetic English fallback (e.g. "car"→ka, "knee"→ni)
    const t = raw.toLowerCase().trim().replace(/[.,!?。、\s]/g, '');
    if (phonetic.some(p => t === p)) return true;

    // Direct kana char equality
    if (raw.trim() === entry.k) return true;
  }
  return false;
}

// ─── USER PROFILE ────────────────────────────────────────────────────────────
const PROFILE_KEY = 'kana_quiz_profile_v1';

function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    version: 1,
    currentUser: 'default',
    users: {
      default: { name: 'Default', stats: {} }
    }
  };
}

function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch(e) {}
}

function getCurrentUserStats(p) {
  const u = p.users[p.currentUser];
  if (!u.stats) u.stats = {};
  return u.stats;
}

function recordAttempt(p, kanaChar, isCorrect, fontName) {
  const stats = getCurrentUserStats(p);
  if (!stats[kanaChar]) stats[kanaChar] = { seen: 0, correct: 0, incorrect: 0, fonts: {} };
  const s = stats[kanaChar];
  s.seen++;
  if (isCorrect) s.correct++; else s.incorrect++;
  // track font
  if (!s.fonts[fontName]) s.fonts[fontName] = { correct: 0, incorrect: 0 };
  if (isCorrect) s.fonts[fontName].correct++; else s.fonts[fontName].incorrect++;
  saveProfile(p);
}

function clearProfileStats(p, mode) {
  const stats = getCurrentUserStats(p);
  const deck = mode === 'hiragana' ? hiragana : mode === 'katakana' ? katakana : [...hiragana, ...katakana];
  deck.forEach(entry => { delete stats[entry.k]; });
  saveProfile(p);
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let profile = loadProfile();
let mode = 'hiragana';
let deck = [...hiragana];
let current = null;
let currentFont = FONTS[0];
let nCorrect = 0, nStreak = 0, nTotal = 0;
let wrongCount = 0;
let isFirstAttempt = true;
let recog = null, listening = false;
let transcriptClearTimer = null;
let resultHandled = false;
let autoStartEnabled = false;

// ─── DOM REFS ────────────────────────────────────────────────────────────────
const kanaEl     = document.getElementById('kana-display');
const altFontsEl = document.getElementById('alt-fonts');
const romajiEl   = document.getElementById('romaji-hint');
const micBtn     = document.getElementById('mic-btn');
const transcEl   = document.getElementById('transcript');
const feedEl     = document.getElementById('feedback');
const hintBtn    = document.getElementById('hint-btn');
const skipBtn    = document.getElementById('skip-btn');
const resetBtn   = document.getElementById('reset-btn');
const clearBtn   = document.getElementById('clear-stats-btn');
const errorEl    = document.getElementById('error');

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function setScore(id, val) {
  document.querySelector('#' + id + ' .score-num').textContent = val;
}

function updatePct() {
  const pct = nTotal > 0 ? Math.round((nCorrect / nTotal) * 100) + '%' : '—';
  setScore('score-pct', pct);
}

function scheduleTranscriptClear(ms) {
  if (transcriptClearTimer) clearTimeout(transcriptClearTimer);
  transcriptClearTimer = setTimeout(() => { transcEl.textContent = ''; }, ms);
}

function speakKana(entry) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(entry.k);
  utt.lang = 'ja-JP'; utt.rate = 0.8;
  const voices = speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) utt.voice = jpVoice;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

function blinkRomaji() {
  romajiEl.textContent = current.r;
  let count = 0;
  const interval = setInterval(() => {
    romajiEl.style.color = (count % 2 === 0) ? 'var(--green)' : 'var(--text-muted)';
    count++;
    if (count >= 6) { clearInterval(interval); romajiEl.style.color = 'var(--green)'; }
  }, 180);
}

function showAltFonts() {
  const alts = FONTS.filter(f => f !== currentFont).sort(() => Math.random() - 0.5).slice(0, 2);
  altFontsEl.innerHTML = '';
  alts.forEach((font, i) => {
    const el = document.createElement('span');
    el.className = 'alt-char';
    el.textContent = current.k;
    el.style.fontFamily = `'${font}', serif`;
    el.title = font;
    el.addEventListener('click', () => speakKana(current));
    altFontsEl.appendChild(el);
    setTimeout(() => el.classList.add('visible'), 50 + i * 80);
  });
}

function hideAltFonts() {
  altFontsEl.querySelectorAll('.alt-char').forEach(el => el.classList.remove('visible'));
  setTimeout(() => { altFontsEl.innerHTML = ''; }, 400);
}

// ─── PICK NEXT ───────────────────────────────────────────────────────────────
function pickNext() {
  const pool = deck.filter(x => x !== current);
  current = pool[Math.floor(Math.random() * pool.length)];
  currentFont = pickFont();
  wrongCount = 0;
  isFirstAttempt = true;
  resultHandled = false;
  if (transcriptClearTimer) clearTimeout(transcriptClearTimer);
  hideAltFonts();

  kanaEl.style.opacity = '0';
  kanaEl.style.transform = 'translateY(8px)';
  setTimeout(() => {
    kanaEl.textContent = current.k;
    kanaEl.style.fontFamily = `'${currentFont}', serif`;
    kanaEl.style.opacity = '1';
    kanaEl.style.transform = 'translateY(0)';
    // record 'seen' in profile
    const stats = getCurrentUserStats(profile);
    if (!stats[current.k]) stats[current.k] = { seen: 0, correct: 0, incorrect: 0, fonts: {} };
    // Auto-start recognition
    if (autoStartEnabled) tryAutoStart();
  }, 160);

  romajiEl.textContent = '';
  romajiEl.style.color = 'var(--text-muted)';
  transcEl.textContent = '';
  feedEl.textContent = '';
  feedEl.className = '';
  micBtn.className = '';
  errorEl.textContent = '';
}

function tryAutoStart() {
  if (listening) return;
  recog = buildRecog();
  if (!recog) return;
  try { recog.start(); } catch(e) { /* silent fail — user can click manually */ }
}

// ─── WRONG HANDLER ───────────────────────────────────────────────────────────
function onWrong() {
  wrongCount++;
  nStreak = 0;
  setScore('score-streak', nStreak);
  micBtn.className = 'wrong';
  kanaEl.classList.add('flash-wrong');
  setTimeout(() => kanaEl.classList.remove('flash-wrong'), 500);
  scheduleTranscriptClear(10000);

  if (wrongCount === 1) {
    romajiEl.textContent = current.r;
    romajiEl.style.color = 'var(--text-muted)';
    feedEl.textContent = '違う — try again';
    feedEl.className = 'err';
  } else if (wrongCount === 2) {
    feedEl.textContent = '違う — listen carefully';
    feedEl.className = 'err';
    blinkRomaji();
  } else {
    romajiEl.textContent = current.r;
    romajiEl.style.color = 'var(--green)';
    feedEl.textContent = '聞いて · repeat after';
    feedEl.className = 'err';
    speakKana(current);
  }
}

// ─── RESULT HANDLER ──────────────────────────────────────────────────────────
function handleFinalResult(allTranscripts) {
  if (resultHandled) return;
  resultHandled = true;

  const display = allTranscripts.reduce((a, b) => a.length <= b.length ? a : b, allTranscripts[0] || '');
  transcEl.textContent = display;

  const isCorrect = accepted(current, allTranscripts);

  // Record in profile on first attempt only
  if (isFirstAttempt) {
    isFirstAttempt = false;
    recordAttempt(profile, current.k, isCorrect, currentFont);
  }

  nTotal++;
  setScore('score-total', nTotal);

  if (isCorrect) {
    nCorrect++;
    nStreak++;
    setScore('score-correct', nCorrect);
    setScore('score-streak', nStreak);
    updatePct();
    micBtn.className = 'correct';
    feedEl.textContent = '正解！';
    feedEl.className = 'ok';
    kanaEl.classList.add('flash-correct');
    showAltFonts();
    setTimeout(() => {
      kanaEl.classList.remove('flash-correct');
      pickNext();
    }, 900);
  } else {
    updatePct();
    onWrong();
  }
}

// ─── SPEECH RECOGNITION ──────────────────────────────────────────────────────
function buildRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { errorEl.textContent = 'SpeechRecognition not supported — try Safari.'; return null; }
  const r = new SR();
  r.lang = 'ja-JP';
  r.interimResults = false;
  r.maxAlternatives = 8;
  r.continuous = false;

  r.onstart = () => {
    listening = true;
    resultHandled = false;
    micBtn.className = 'listening';
    transcEl.textContent = '…';
    if (transcriptClearTimer) clearTimeout(transcriptClearTimer);
    errorEl.textContent = '';
    feedEl.textContent = '';
    feedEl.className = '';
  };
  r.onend = () => {
    listening = false;
    if (micBtn.className === 'listening') micBtn.className = '';
  };
  r.onerror = e => {
    listening = false;
    micBtn.className = '';
    transcEl.textContent = '';
    if (e.error === 'not-allowed') errorEl.textContent = 'Mic access denied — check browser permissions.';
    else if (e.error !== 'no-speech' && e.error !== 'aborted') errorEl.textContent = 'Error: ' + e.error;
  };
  r.onresult = e => {
    const allAlts = [];
    for (let i = 0; i < e.results.length; i++)
      for (let j = 0; j < e.results[i].length; j++) {
        const t = e.results[i][j].transcript.trim();
        if (t) allAlts.push(t);
      }
    if (allAlts.length) { r.stop(); handleFinalResult(allAlts); }
  };
  return r;
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (listening) { recog && recog.stop(); return; }
  autoStartEnabled = true; // user has granted gesture, enable auto-start
  recog = buildRecog();
  if (!recog) return;
  try { recog.start(); } catch(e) { errorEl.textContent = e.message; }
});

kanaEl.addEventListener('click', () => speakKana(current));
romajiEl.addEventListener('click', () => { if (current) speakKana(current); });

hintBtn.addEventListener('click', () => {
  romajiEl.textContent = current.r;
  speakKana(current);
});

skipBtn.addEventListener('click', () => {
  recog && recog.stop();
  pickNext();
});

resetBtn.addEventListener('click', () => {
  nCorrect = nStreak = nTotal = 0;
  ['score-correct','score-streak','score-total'].forEach(id => setScore(id, 0));
  setScore('score-pct', '—');
});

clearBtn.addEventListener('click', () => {
  if (confirm(`Clear profile stats for ${mode}?`)) {
    clearProfileStats(profile, mode);
  }
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    deck = mode === 'hiragana' ? [...hiragana] : mode === 'katakana' ? [...katakana] : [...hiragana, ...katakana];
    nCorrect = nStreak = nTotal = 0;
    ['score-correct','score-streak','score-total'].forEach(id => setScore(id, 0));
    setScore('score-pct', '—');
    recog && recog.stop();
    pickNext();
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
kanaEl.style.transition = 'opacity 0.18s, transform 0.18s';
pickNext();
</script>
</body>
</html>
